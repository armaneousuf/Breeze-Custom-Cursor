<!-- zoom-in.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="257" height="257" viewBox="0 0 24 24" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>zoom-in</title>
  <g fill="none" stroke="#0000FF" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round">
    <!-- 1. The solid green background filling the circular lens area -->
    <path fill="#00FF00" stroke="none" d="M4.31 6.51 A6 6 0 1 0 6.51 4.31 Z"/>

    <!-- 2. The structural lines: Handle and the Broken Outer Circle Outline -->
    <path d="M13.74 13.74L17.5 17.5M6.51 4.31a6 6 0 1 1 -2.2 2.2"/>

    <!-- 3. The Plus (+) sign inside, centered on the lens center (9.5, 9.5) -->
    <path d="M7.25 9.5H11.75M9.5 7.25V11.75"/>
  </g>
</svg>